<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DropZone | Ultra Wallet</title>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --neon-green: #00ff88;
            --neon-purple: #bc13fe;
            --neon-blue: #00d2ff;
            --bg-dark: #020617;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Rajdhani', sans-serif;
            background: var(--bg-dark);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: white;
        }

        /* Animated Background Particles Effect */
        body::before {
            content: "";
            position: absolute;
            width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(188, 19, 254, 0.1) 0%, transparent 40%),
                        radial-gradient(circle, rgba(0, 210, 255, 0.1) 0%, transparent 40%);
            animation: moveBg 15s linear infinite;
            z-index: -1;
        }

        @keyframes moveBg {
            0% { transform: translate(-25%, -25%); }
            100% { transform: translate(0%, 0%); }
        }

        /* Main Glass Card */
        .wallet-container {
            width: 360px;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(25px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 40px;
            padding: 30px;
            box-shadow: 0 0 40px rgba(0,0,0,0.8);
            text-align: center;
            position: relative;
            animation: zoomIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes zoomIn { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }

        .header-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem;
            letter-spacing: 4px;
            background: linear-gradient(to right, var(--neon-blue), var(--neon-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
        }

        /* Animated Balance Display */
        .balance-card {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 30px;
            padding: 30px 10px;
            margin-bottom: 25px;
            border: 1px solid rgba(0, 255, 136, 0.2);
            box-shadow: inset 0 0 20px rgba(0, 255, 136, 0.05);
            transition: 0.3s;
        }

        .balance-card:hover { border-color: var(--neon-green); transform: translateY(-5px); }

        .coin-val {
            font-family: 'Orbitron', sans-serif;
            font-size: 3rem;
            color: var(--neon-green);
            text-shadow: 0 0 20px rgba(0, 255, 136, 0.6);
            margin: 10px 0;
        }

        /* Gaming Buttons */
        .btn {
            position: relative;
            width: 100%;
            padding: 16px;
            margin: 8px 0;
            border: none;
            border-radius: 18px;
            font-family: 'Rajdhani', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            overflow: hidden;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .btn-prime {
            background: linear-gradient(45deg, var(--neon-purple), var(--neon-blue));
            color: white;
            box-shadow: 0 10px 20px rgba(188, 19, 254, 0.3);
        }

        .btn-prime:hover { box-shadow: 0 0 25px var(--neon-purple); transform: scale(1.02); }

        .btn-outline {
            background: rgba(255,255,255,0.05);
            color: white;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .btn-outline:hover { background: rgba(255,255,255,0.15); border-color: var(--neon-blue); }

        /* Small action buttons */
        .action-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 10px; }

        /* Loader Ring */
        .loader-ring {
            display: none;
            width: 20px; height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 0.8s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

    </style>
</head>
<body>

    <div class="wallet-container">
        <div class="header-title">DATA CENTER</div>
        
        <div class="balance-card">
            <span style="font-size: 0.8rem; color: #94a3b8; letter-spacing: 3px;">TOTAL CREDITS</span>
            <div class="coin-val" id="coinDisplay">0</div>
            <div id="syncStatus" style="font-size: 0.7rem; color: var(--neon-green);">● SYSTEM ENCRYPTED</div>
        </div>

        <button class="btn btn-prime" onclick="addFunds(100)">
            <span id="btnText">⚡ RECHARGE ₹100</span>
            <div class="loader-ring" id="loader"></div>
        </button>

        <div class="action-row">
            <button class="btn btn-outline" onclick="manualUpdate(50)">➕ 50</button>
            <button class="btn btn-outline" onclick="manualUpdate(-20)">➖ 20</button>
        </div>

        <button class="btn btn-outline" style="margin-top:20px; font-size: 0.7rem; border:none;" onclick="location.href='dashboard.html'">
            EXIT TO DASHBOARD
        </button>
    </div>

<script>
    // Tuze Firebase Config (Mala mahit ahe tu tech vapartoys)
    const firebaseConfig = {
        apiKey: "AIzaSyAtqdZUIdCnUKwVF0ojn_Mv-zARgv0m4H0",
        authDomain: "dropzoneff-b9667.firebaseapp.com",
        projectId: "dropzoneff-b9667"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    let currentBalance = 0;

    auth.onAuthStateChanged(user => {
        if (user) {
            // Instant Snapshot (Realtime Data)
            db.collection("users").doc(user.uid).onSnapshot(doc => {
                if (doc.exists) {
                    const targetBalance = doc.data().coins || 0;
                    rollNumber(currentBalance, targetBalance);
                    currentBalance = targetBalance;
                }
            });
        } else {
            window.location = "index.html";
        }
    });

    // 💎 Pro Number Counting Effect
    function rollNumber(start, end) {
        const display = document.getElementById("coinDisplay");
        let duration = 800; 
        let startTime = null;

        function animation(currentTime) {
            if (!startTime) startTime = currentTime;
            let progress = currentTime - startTime;
            let currentNum = Math.floor(start + (end - start) * (progress / duration));
            
            display.innerText = currentNum;
            
            if (progress < duration) {
                requestAnimationFrame(animation);
            } else {
                display.innerText = end;
            }
        }
        requestAnimationFrame(animation);
    }

    async function manualUpdate(amt) {
        const user = auth.currentUser;
        if(amt < 0 && currentBalance < Math.abs(amt)) {
            alert("❌ Insufficient Credits!"); return;
        }
        
        await db.collection("users").doc(user.uid).update({
            coins: firebase.firestore.FieldValue.increment(amt)
        });
    }

    function addFunds(amt) {
        const user = auth.currentUser;
        const options = {
            key: "rzp_test_SVoTmT5HZZyDLN",
            amount: amt * 100,
            currency: "INR",
            name: "DropZone Elite",
            handler: async function() {
                toggleLoader(true);
                await db.collection("users").doc(user.uid).update({
                    coins: firebase.firestore.FieldValue.increment(amt)
                });
                toggleLoader(false);
                alert("💎 Credits Added Successfully!");
            }
        };
        const rzp = new Razorpay(options);
        rzp.open();
    }

    function toggleLoader(show) {
        document.getElementById("btnText").style.display = show ? "none" : "block";
        document.getElementById("loader").style.display = show ? "block" : "none";
    }
</script>
</body>
</html>
