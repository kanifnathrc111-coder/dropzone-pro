<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DropZone | Elite Cyber Wallet</title>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root { 
            --neon-blue: #00f2ff; 
            --neon-purple: #bc13fe;
            --neon-green: #0cf3a1;
            --glass: rgba(255, 255, 255, 0.03);
        }

        body { 
            margin: 0; padding: 0; font-family: 'Rajdhani', sans-serif; 
            background: #020205; color: white; display: flex; justify-content: center; 
            align-items: center; min-height: 100vh; overflow: hidden;
        }

        /* Animated Particles Background */
        #particles-js {
            position: absolute; width: 100%; height: 100%; z-index: -1;
            background: radial-gradient(circle at center, #110b24 0%, #020205 100%);
        }

        .wallet-container {
            width: 360px; position: relative; z-index: 10;
        }

        /* Premium Glass Card */
        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 45px;
            padding: 40px 25px;
            text-align: center;
            box-shadow: 0 0 50px rgba(0, 242, 255, 0.1);
            position: relative;
        }

        /* Diamond Glow Effect */
        .diamond-icon {
            font-size: 3.5rem;
            color: var(--neon-blue);
            filter: drop-shadow(0 0 15px var(--neon-blue));
            animation: float 3s ease-in-out infinite;
            margin-bottom: 15px;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .balance-label { font-size: 0.8rem; letter-spacing: 5px; color: #888; text-transform: uppercase; }
        
        .coin-value {
            font-family: 'Orbitron'; font-size: 4rem; margin: 10px 0;
            background: linear-gradient(to bottom, #fff, var(--neon-blue));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-shadow: 0 10px 20px rgba(0, 242, 255, 0.3);
        }

        /* Action Buttons */
        .recharge-btn {
            width: 100%; padding: 20px; border: none; border-radius: 20px;
            background: linear-gradient(45deg, var(--neon-blue), var(--neon-purple));
            color: white; font-family: 'Orbitron'; font-weight: bold; font-size: 1rem;
            cursor: pointer; transition: 0.4s; margin-top: 30px;
            display: flex; justify-content: center; align-items: center; gap: 10px;
            box-shadow: 0 15px 35px rgba(188, 19, 254, 0.3);
        }

        .recharge-btn:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 0 40px var(--neon-blue);
        }

        .history-row {
            display: flex; justify-content: space-between; margin-top: 30px;
            padding: 15px; background: rgba(255,255,255,0.05); border-radius: 20px;
            font-size: 0.8rem; border: 1px solid rgba(255,255,255,0.05);
        }

        .status-dot { width: 8px; height: 8px; background: var(--neon-green); border-radius: 50%; display: inline-block; margin-right: 5px; box-shadow: 0 0 10px var(--neon-green); }

        .back-btn {
            margin-top: 25px; display: inline-block; color: #555; text-decoration: none;
            font-size: 0.8rem; transition: 0.3s;
        }
        .back-btn:hover { color: var(--neon-blue); }

        /* Sync Loader */
        #loader { display: none; width: 20px; height: 20px; border: 3px solid #fff; border-top: 3px solid transparent; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

    </style>
</head>
<body>

    <div id="particles-js"></div>

    <div class="wallet-container">
        <div class="glass-card">
            <div class="diamond-icon">
                <i class="fa-solid fa-gem"></i>
            </div>
            
            <div class="balance-label">Core Credits</div>
            <div class="coin-value" id="coinDisplay">0</div>
            
            <div style="font-size: 0.9rem; color: var(--neon-green);">
                <span class="status-dot"></span> System Online
            </div>

            <button class="recharge-btn" id="rechargeAction">
                <span id="btnText"><i class="fa-solid fa-bolt"></i> ADD 100 DIAMONDS</span>
                <div id="loader"></div>
            </button>

            <div class="history-row">
                <span>Last Transaction</span>
                <span style="color: var(--neon-blue);">Success +100 💎</span>
            </div>

            <a href="dashboard.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i> RETURN TO LOBBY</a>
        </div>
    </div>

<script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, onSnapshot, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAtqdZUIdCnUKwVF0ojn_Mv-zARgv0m4H0",
        authDomain: "dropzoneff-b9667.firebaseapp.com",
        projectId: "dropzoneff-b9667"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let currentBalance = 0;

    // --- 1. Real-time Balance Sync ---
    onAuthStateChanged(auth, user => {
        if (user) {
            onSnapshot(doc(db, "users", user.uid), (snap) => {
                if (snap.exists()) {
                    const newBal = snap.data().coins || 0;
                    animateCount(currentBalance, newBal);
                    currentBalance = newBal;
                }
            });
        } else {
            window.location.href = "login.html";
        }
    });

    // --- 2. Razorpay Integration ---
    document.getElementById('rechargeAction').onclick = () => {
        const user = auth.currentUser;
        if(!user) return;

        const options = {
            key: "rzp_live_SVoTmT5HZZyDLN", 
            amount: 100 * 100, // ₹100
            currency: "INR",
            name: "DropZone Elite",
            description: "Purchase 100 Elite Diamonds",
            handler: async function (res) {
                toggleLoading(true);
                try {
                    // **खरोखर डायमंड्स ॲड करणारी ओळ**
                    await updateDoc(doc(db, "users", user.uid), {
                        coins: increment(100)
                    });
                    Swal.fire({
                        icon: 'success',
                        title: 'Elite Diamonds Added!',
                        text: 'तुमच्या वॉलेटमध्ये १०० डायमंड्स जमा झाले आहेत.',
                        background: '#05070a',
                        color: '#fff',
                        confirmButtonColor: '#00f2ff'
                    });
                } catch (e) {
                    Swal.fire('Error', 'Update Failed!', 'error');
                }
                toggleLoading(false);
            },
            theme: { color: "#00f2ff" }
        };
        const rzp = new Razorpay(options);
        rzp.open();
    };

    // --- Helpers ---
    function toggleLoading(isLoading) {
        document.getElementById('btnText').style.display = isLoading ? 'none' : 'block';
        document.getElementById('loader').style.display = isLoading ? 'block' : 'none';
    }

    function animateCount(start, end) {
        const el = document.getElementById("coinDisplay");
        let current = start;
        const range = end - start;
        const incrementVal = range > 0 ? 1 : -1;
        const stepTime = Math.abs(Math.floor(1000 / range));
        
        if(range === 0) { el.innerText = end; return; }

        const timer = setInterval(() => {
            current += incrementVal;
            el.innerText = current;
            if (current == end) clearInterval(timer);
        }, 10);
    }

    // --- Particles Config ---
    particlesJS("particles-js", {
        "particles": {
            "number": { "value": 80 },
            "color": { "value": "#00f2ff" },
            "shape": { "type": "circle" },
            "opacity": { "value": 0.2 },
            "size": { "value": 3 },
            "line_linked": { "enable": true, "distance": 150, "color": "#00f2ff", "opacity": 0.1, "width": 1 },
            "move": { "enable": true, "speed": 2 }
        }
    });
</script>
</body>
</html>
