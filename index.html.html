<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DropZone Elite | Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff4b2b;
            --secondary: #ffcc00;
            --neon: #00f2ff;
            --bg: #020617;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0; font-family: 'Poppins', sans-serif;
            background: var(--bg);
            height: 100vh; display: flex; justify-content: center; align-items: center;
            color: white; overflow: hidden;
            position: relative;
        }

        /* Animated Background Particles */
        .bg-animate {
            position: absolute; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, #1e1b4b 0%, #020617 100%);
            z-index: -1;
        }

        .login-card {
            width: 92%; max-width: 400px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            padding: 40px 30px; border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 25px 50px rgba(0,0,0,0.6);
            text-align: center;
            z-index: 10;
            animation: appEntry 1s cubic-bezier(0.19, 1, 0.22, 1);
        }

        @keyframes appEntry {
            0% { opacity: 0; transform: scale(0.8) translateY(50px); filter: blur(10px); }
            100% { opacity: 1; transform: scale(1) translateY(0); filter: blur(0); }
        }

        h2 {
            font-family: 'Orbitron', sans-serif; font-size: 28px;
            letter-spacing: 6px; margin-bottom: 35px;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 8px rgba(255,75,43,0.4));
        }

        .input-box { position: relative; margin-bottom: 18px; }

        input {
            width: 100%; padding: 16px 20px; border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(0,0,0,0.5); color: white;
            outline: none; transition: 0.4s; font-size: 14px;
        }

        input:focus {
            border-color: var(--neon);
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.2);
            background: rgba(0,0,0,0.7);
        }

        .eye {
            position: absolute; right: 18px; top: 16px;
            cursor: pointer; opacity: 0.5; font-size: 18px;
        }

        button {
            width: 100%; padding: 16px; border: none; border-radius: 15px;
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            color: white; font-weight: 800; font-family: 'Orbitron';
            cursor: pointer; transition: 0.3s; margin-top: 15px;
            letter-spacing: 1px; box-shadow: 0 8px 20px rgba(255, 75, 43, 0.3);
        }

        button:hover { transform: translateY(-2px); box-shadow: 0 12px 25px rgba(255, 75, 43, 0.5); }
        button:active { transform: scale(0.95); }

        .strength-bar {
            height: 5px; width: 100%; background: #111;
            margin-top: 10px; border-radius: 10px; overflow: hidden;
        }
        #bar-fill { height: 100%; width: 0%; transition: 0.6s cubic-bezier(0.4, 0, 0.2, 1); }

        .toggle-btn { margin-top: 25px; color: #888; cursor: pointer; font-size: 13px; text-transform: uppercase; letter-spacing: 1px; }
        .toggle-btn span { color: var(--neon); font-weight: bold; }

        #error-msg { color: #ff3e3e; font-size: 12px; margin-top: 15px; font-weight: 500; animation: shake 0.4s ease-in-out; }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .loader {
            display: none; width: 20px; height: 20px; border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%; border-top-color: #fff; animation: spin 0.8s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="bg-animate"></div>

<div class="login-card">
    <h2 id="brand">DROPZONE</h2>

    <div id="login-section">
        <div class="input-box">
            <input type="email" id="l-email" placeholder="EMAIL ADDRESS">
        </div>
        <div class="input-box">
            <input type="password" id="l-pass" placeholder="PASSWORD">
            <span class="eye" id="l-eye">👁️</span>
        </div>
        <button id="login-btn">ENTER ARENA <div class="loader" id="l-loader"></div></button>
        <p class="toggle-btn" id="go-to-reg">New Warrior? <span>JOIN ELITE</span></p>
    </div>

    <div id="reg-section" style="display:none;">
        <div class="input-box">
            <input type="text" id="r-name" placeholder="GAMER TAG (Username)">
        </div>
        <div class="input-box">
            <input type="email" id="r-email" placeholder="EMAIL ADDRESS">
        </div>
        <div class="input-box">
            <input type="password" id="r-pass" placeholder="CREATE PASSWORD">
            <span class="eye" id="r-eye">👁️</span>
            <div class="strength-bar"><div id="bar-fill"></div></div>
        </div>
        <button id="reg-btn">CLAIM IDENTITY <div class="loader" id="r-loader"></div></button>
        <p class="toggle-btn" id="go-to-login">Already Member? <span>BACK TO LOGIN</span></p>
    </div>

    <p id="error-msg"></p>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAtqdZUIdCnUKwVF0ojn_Mv-zARgv0m4H0",
        authDomain: "dropzoneff-b9667.firebaseapp.com",
        projectId: "dropzoneff-b9667",
        storageBucket: "dropzoneff-b9667.firebasestorage.app",
        messagingSenderId: "1091592048913",
        appId: "1:1091592048913:web:cea75a4b7da0afb6737cb0"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // Function 1: Check if User already Logged In (Auto-Redirect)
    onAuthStateChanged(auth, (user) => {
        if (user) {
            window.location.href = "dashboard.html";
        }
    });

    const lSec = document.getElementById('login-section');
    const rSec = document.getElementById('reg-section');
    const errorMsg = document.getElementById('error-msg');

    // Section Toggling
    document.getElementById('go-to-reg').onclick = () => { lSec.style.display='none'; rSec.style.display='block'; errorMsg.innerText=''; };
    document.getElementById('go-to-login').onclick = () => { rSec.style.display='none'; lSec.style.display='block'; errorMsg.innerText=''; };

    // Function 2: Toggle Visibility
    const toggleEye = (eyeId, inputId) => {
        document.getElementById(eyeId).onclick = function() {
            const input = document.getElementById(inputId);
            input.type = input.type === "password" ? "text" : "password";
            this.innerText = input.type === "password" ? "👁️" : "🙈";
        };
    };
    toggleEye('l-eye', 'l-pass');
    toggleEye('r-eye', 'r-pass');

    // Function 3: Password Strength Realtime
    document.getElementById('r-pass').oninput = function() {
        let val = this.value;
        let score = 0;
        if(val.length >= 6) score++;
        if(/[A-Z]/.test(val)) score++;
        if(/[0-9]/.test(val)) score++;
        if(/[^A-Za-z0-9]/.test(val)) score++;
        
        const bar = document.getElementById('bar-fill');
        const colors = ["#ff4b2b", "#ffa500", "#ffff00", "#00ff00"];
        bar.style.width = (score * 25) + "%";
        bar.style.background = colors[score-1] || "#333";
    };

    // REGISTER ACTION
    document.getElementById('reg-btn').onclick = async () => {
        const name = document.getElementById('r-name').value.trim();
        const email = document.getElementById('r-email').value.trim();
        const pass = document.getElementById('r-pass').value;
        const loader = document.getElementById('r-loader');

        if(!name || name.length < 3) { showError("Gamer Tag खूप लहान आहे!"); return; }
        
        loader.style.display = 'inline-block';
        try {
            const res = await createUserWithEmailAndPassword(auth, email, pass);
            await setDoc(doc(db, "users", res.user.uid), {
                username: name,
                coins: 50,
                level: 1,
                joinedDate: new Date().toISOString()
            });
            window.location.href = "dashboard.html";
        } catch (e) {
            showError(e.message);
            loader.style.display = 'none';
        }
    };

    // LOGIN ACTION
    document.getElementById('login-btn').onclick = async () => {
        const email = document.getElementById('l-email').value.trim();
        const pass = document.getElementById('l-pass').value;
        const loader = document.getElementById('l-loader');

        loader.style.display = 'inline-block';
        try {
            await signInWithEmailAndPassword(auth, email, pass);
            // Storage for Auto-fill email next time
            localStorage.setItem("last_user", email);
            window.location.href = "dashboard.html";
        } catch (e) {
            showError("Access Denied! चुकीचा ईमेल किंवा पासवर्ड.");
            loader.style.display = 'none';
        }
    };

    function showError(text) {
        errorMsg.innerText = text;
        errorMsg.style.animation = 'none';
        setTimeout(() => errorMsg.style.animation = 'shake 0.4s ease-in-out', 10);
    }

    // Autofill last email
    window.onload = () => {
        const saved = localStorage.getItem("last_user");
        if(saved) document.getElementById('l-email').value = saved;
    };
</script>
</body>
</html>
