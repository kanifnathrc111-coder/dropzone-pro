<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DropZone | Modern Login</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root {
    --primary: #ff8c00;
    --secondary: #ffcc00;
    --bg: #0f0f0f;
    --card-bg: rgba(25, 25, 25, 0.95);
}

body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    color: white;
    overflow: hidden;
}

/* Background Animation */
body::before {
    content: "";
    position: absolute;
    width: 300px;
    height: 300px;
    background: var(--primary);
    filter: blur(150px);
    border-radius: 50%;
    z-index: -1;
    animation: float 10s infinite alternate;
}

@keyframes float {
    from { transform: translate(-50%, -50%); }
    to { transform: translate(50%, 50%); }
}

.container {
    width: 380px;
    background: var(--card-bg);
    padding: 40px;
    border-radius: 24px;
    box-shadow: 0 15px 35px rgba(0,0,0,0.5), 0 0 15px rgba(255,140,0,0.1);
    border: 1px solid rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
    transform: translateY(0);
    transition: all 0.4s ease;
}

h2 {
    text-align: center;
    font-weight: 600;
    margin-bottom: 30px;
    letter-spacing: 1px;
    background: linear-gradient(90deg, #ff8c00, #ffcc00);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.input-group {
    margin-bottom: 20px;
    position: relative;
}

input {
    width: 100%;
    padding: 14px;
    box-sizing: border-box;
    border-radius: 12px;
    border: 2px solid transparent;
    background: #222;
    color: white;
    font-size: 14px;
    transition: 0.3s;
    outline: none;
}

input:focus {
    border-color: var(--primary);
    background: #2a2a2a;
    box-shadow: 0 0 10px rgba(255,140,0,0.2);
}

button {
    width: 100%;
    padding: 14px;
    background: linear-gradient(90deg, var(--primary), var(--secondary));
    border: none;
    border-radius: 12px;
    cursor: pointer;
    font-weight: 600;
    font-size: 16px;
    color: #000;
    transition: 0.3s;
    margin-top: 10px;
}

button:hover {
    transform: scale(1.02);
    box-shadow: 0 5px 15px rgba(255,140,0,0.4);
}

button:active {
    transform: scale(0.98);
}

.switch {
    text-align: center;
    margin-top: 20px;
    cursor: pointer;
    font-size: 14px;
    color: #888;
    transition: 0.3s;
}

.switch b {
    color: var(--secondary);
}

.switch:hover b {
    text-decoration: underline;
}

#error {
    color: #ff4d4d;
    text-align: center;
    font-size: 13px;
    margin-top: 15px;
    min-height: 20px;
}

/* Animations for switching forms */
.fade-in {
    animation: fadeIn 0.5s ease;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
}
</style>
</head>

<body>

<div class="container" id="form-container">
    <h2 id="title">Welcome Back</h2>

    <div id="login-form" class="fade-in">
        <div class="input-group">
            <input type="email" id="loginEmail" placeholder="Email Address">
        </div>
        <div class="input-group">
            <input type="password" id="loginPass" placeholder="Password">
        </div>
        <button onclick="login()">Sign In</button>
    </div>

    <div id="register-form" style="display:none;" class="fade-in">
        <div class="input-group">
            <input type="text" id="name" placeholder="Full Name">
        </div>
        <div class="input-group">
            <input type="email" id="email" placeholder="Email Address">
        </div>
        <div class="input-group">
            <input type="password" id="pass" placeholder="Create Password">
        </div>
        <button onclick="register()">Create Account</button>
    </div>

    <p class="switch" onclick="toggle()">
        <span id="switch-text">Don't have an account? <b>Register</b></span>
    </p>
    <p id="error"></p>
</div>

<script>
// Firebase Config
const firebaseConfig = {
  apiKey: "AIzaSyAtqdZUIdCnUKwVF0ojn_Mv-zARgv0m4H0",
  authDomain: "dropzoneff-b9667.firebaseapp.com",
  projectId: "dropzoneff-b9667",
  storageBucket: "dropzoneff-b9667.firebasestorage.app",
  messagingSenderId: "1091592048913",
  appId: "1:1091592048913:web:cea75a4b7da0afb6737cb0"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

// UI Toggle Logic
let isLogin = true;
function toggle() {
    isLogin = !isLogin;
    const loginForm = document.getElementById("login-form");
    const regForm = document.getElementById("register-form");
    const title = document.getElementById("title");
    const switchText = document.getElementById("switch-text");

    if (isLogin) {
        loginForm.style.display = "block";
        regForm.style.display = "none";
        title.innerText = "Welcome Back";
        switchText.innerHTML = "Don't have an account? <b>Register</b>";
    } else {
        loginForm.style.display = "none";
        regForm.style.display = "block";
        title.innerText = "Join DropZone";
        switchText.innerHTML = "Already have an account? <b>Login</b>";
    }
}

// Register Function
function register() {
    const name = document.getElementById("name").value;
    const email = document.getElementById("email").value;
    const pass = document.getElementById("pass").value;
    const errorEl = document.getElementById("error");

    if(!name || !email || !pass) {
        errorEl.innerText = "Please fill all fields.";
        return;
    }

    auth.createUserWithEmailAndPassword(email, pass)
    .then(res => {
        return db.collection("users").doc(res.user.uid).set({
            name: name,
            coins: 100,
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });
    })
    .then(() => {
        alert("🔥 Account Created Successfully!");
    })
    .catch(e => {
        errorEl.innerText = e.message;
    });
}

// Login Function
function login() {
    const email = document.getElementById("loginEmail").value;
    const pass = document.getElementById("loginPass").value;
    const errorEl = document.getElementById("error");

    auth.signInWithEmailAndPassword(email, pass)
    .catch(e => {
        errorEl.innerText = e.message;
    });
}

// Auth State Observer
auth.onAuthStateChanged(user => {
    if (user) {
        window.location = "dashboard.html";
    }
});
</script>

</body>
</html>
