<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DropZone Elite | Pro Max</title>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <style>
        :root {
            --primary: #ff4b2b;
            --secondary: #ff416c;
            --accent: #ffcc00; /* FF Gold vibe */
            --bg-dark: #0a0a0c;
        }

        * { box-sizing: border-box; transition: all 0.3s ease; }

        body {
            margin: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            /* Gaming background feel */
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), 
                        url('https://images.unsplash.com/photo-1542751371-adc38448a05e?ixlib=rb-1.2.1&auto=format&fit=crop&w=1350&q=80');
            background-size: cover;
            background-position: center;
            color: white;
            overflow: hidden;
        }

        .card {
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 24px;
            width: 360px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        h2 {
            font-size: 2rem;
            letter-spacing: 2px;
            margin-bottom: 30px;
            text-transform: uppercase;
            background: linear-gradient(to right, #fff, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 900;
        }

        .input-group { margin-bottom: 15px; text-align: left; }

        input {
            width: 100%;
            padding: 14px 20px;
            border: 2px solid transparent;
            border-radius: 12px;
            background: rgba(0, 0, 0, 0.4);
            color: white;
            font-size: 1rem;
            outline: none;
        }

        input:focus {
            border-color: var(--primary);
            background: rgba(0, 0, 0, 0.6);
            box-shadow: 0 0 15px rgba(255, 75, 43, 0.3);
        }

        button {
            width: 100%;
            padding: 16px;
            margin-top: 10px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            color: white;
            font-size: 1.1rem;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 65, 108, 0.4);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 65, 108, 0.6);
        }

        button:disabled { opacity: 0.6; cursor: not-allowed; }

        .switch {
            margin-top: 20px;
            font-size: 0.9rem;
            color: #ccc;
            cursor: pointer;
        }

        .switch b { color: var(--accent); }
        .switch:hover b { text-decoration: underline; }

        .error {
            margin-top: 15px;
            font-size: 0.85rem;
            min-height: 20px;
            font-weight: 500;
        }

        /* Loading Spinner */
        .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
            margin: 0 auto;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="card">
    <h2 id="title">⚡ LOGIN</h2>

    <div id="nameBox" style="display:none;" class="input-group">
        <input type="text" id="name" placeholder="Gamer Nickname (e.g. Pro_Slayer)">
    </div>

    <div class="input-group">
        <input type="email" id="user" placeholder="Email Address">
    </div>

    <div class="input-group">
        <input type="password" id="pass" placeholder="Secret Password">
    </div>

    <button id="btn" onclick="submitForm()">
        <span id="btnText">Enter Battleground</span>
        <div id="loader" class="spinner"></div>
    </button>

    <div class="error" id="error"></div>

    <div class="switch" onclick="switchMode()" id="switchText">
        New recruit? <b>Register Here</b>
    </div>
</div>

<script>
    // Config stays the same
    const firebaseConfig = {
        apiKey: "AIzaSyAtqdZUIdCnUKwVF0ojn_Mv-zARgv0m4H0",
        authDomain: "dropzoneff-b9667.firebaseapp.com",
        projectId: "dropzoneff-b9667"
    };

    if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }
    
    const auth = firebase.auth();
    const db = firebase.firestore();

    let isLogin = true;

    auth.onAuthStateChanged(user => {
       if (user) window.location.href = "dashboard.html";
    });

    function switchMode() {
        isLogin = !isLogin;
        const title = document.getElementById("title");
        const switchText = document.getElementById("switchText");
        const nameBox = document.getElementById("nameBox");
        const btnText = document.getElementById("btnText");

        title.innerText = isLogin ? "⚡ LOGIN" : "🛡️ REGISTER";
        switchText.innerHTML = isLogin ? "New recruit? <b>Register Here</b>" : "Already a veteran? <b>Login</b>";
        btnText.innerText = isLogin ? "Enter Battleground" : "Create Soldier";
        
        nameBox.style.display = isLogin ? "none" : "block";
        document.getElementById("error").innerText = "";
    }

    async function submitForm() {
        let email = document.getElementById("user").value.trim();
        let pass = document.getElementById("pass").value.trim();
        let name = document.getElementById("name").value.trim();
        let error = document.getElementById("error");
        let btn = document.getElementById("btn");
        let btnText = document.getElementById("btnText");
        let loader = document.getElementById("loader");

        if (!email || !pass || (!isLogin && !name)) {
            showError("⚠️ All intel fields are required!");
            return;
        }

        // UI Loading State
        btn.disabled = true;
        btnText.style.display = "none";
        loader.style.display = "block";
        error.innerText = "";

        try {
            if (isLogin) {
                await auth.signInWithEmailAndPassword(email, pass);
                showSuccess("✅ Mission Start!");
                window.location.href = "dashboard.html";
            } else {
                let userCred = await auth.createUserWithEmailAndPassword(email, pass);
                await db.collection("users").doc(userCred.user.uid).set({
                    name: name,
                    coins: 100,
                    rank: "Bronze",
                    joined: new Date().toISOString()
                });
                showSuccess("✅ Account Verified! Tactical entry allowed.");
                setTimeout(() => switchMode(), 1500);
            }
        } catch (err) {
            showError("❌ " + err.message);
        } finally {
            btn.disabled = false;
            btnText.style.display = "block";
            loader.style.display = "none";
        }
    }

    function showError(msg) {
        let error = document.getElementById("error");
        error.style.color = "#ff4b2b";
        error.innerText = msg;
    }

    function showSuccess(msg) {
        let error = document.getElementById("error");
        error.style.color = "#00ff88";
        error.innerText = msg;
    }
</script>

</body>
</html>
