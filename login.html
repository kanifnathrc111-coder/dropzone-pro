<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DropZone Elite | Secure Access</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #ff4b2b;
            --secondary: #ff416c;
            --bg: #0f2027;
            --glass: rgba(255, 255, 255, 0.08);
        }

        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at center, #2c5364, #203a43, #0f2027);
            color: white;
            overflow: hidden;
        }

        .card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 40px;
            border-radius: 24px;
            width: 360px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            border: 1px solid rgba(255,255,255,0.1);
            text-align: center;
        }

        h2 {
            margin-bottom: 30px;
            font-weight: 600;
            letter-spacing: 3px;
            text-transform: uppercase;
            background: linear-gradient(to right, #fff, #aaa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .input-group {
            margin-bottom: 18px;
        }

        input {
            width: 100%;
            padding: 14px 18px;
            box-sizing: border-box;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            background: rgba(0,0,0,0.4);
            color: white;
            font-size: 15px;
            outline: none;
            transition: all 0.3s ease;
        }

        input:focus {
            border-color: var(--primary);
            background: rgba(0,0,0,0.6);
            box-shadow: 0 0 10px rgba(255, 75, 43, 0.3);
        }

        button {
            width: 100%;
            padding: 15px;
            margin-top: 15px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            color: white;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(255, 75, 43, 0.4);
        }

        button:active { transform: translateY(0); }

        button:disabled {
            opacity: 0.6;
            cursor: wait;
        }

        .switch {
            margin-top: 25px;
            font-size: 14px;
            color: #bbb;
            cursor: pointer;
        }

        .switch span {
            color: var(--primary);
            font-weight: 600;
            text-decoration: underline;
        }

        .status-msg {
            font-size: 13px;
            margin-top: 15px;
            min-height: 20px;
            font-weight: 400;
        }
    </style>
</head>
<body>

<div class="card">
    <h2 id="title">Elite Login</h2>

    <div class="input-group" id="nameBox" style="display:none;">
        <input type="text" id="name" placeholder="Gamer Tag">
    </div>
    
    <div class="input-group">
        <input type="email" id="email" placeholder="Email Address">
    </div>

    <div class="input-group">
        <input type="password" id="pass" placeholder="Secret Password">
    </div>

    <button id="actionBtn" onclick="handleAuth()">Access System</button>

    <div class="status-msg" id="status"></div>

    <div class="switch" onclick="toggleMode()" id="toggleBtn">
        New recruit? <span>Join the Elite</span>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAtqdZUIdCnUKwVF0ojn_Mv-zARgv0m4H0",
        authDomain: "dropzoneff-b9667.firebaseapp.com",
        projectId: "dropzoneff-b9667"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    let isLogin = true;

    // Redirect if already logged in
    auth.onAuthStateChanged(user => {
       if (user) window.location.href = "dashboard.html";
    });

    function toggleMode() {
        isLogin = !isLogin;
        document.getElementById("title").innerText = isLogin ? "Elite Login" : "Elite Register";
        document.getElementById("nameBox").style.display = isLogin ? "none" : "block";
        document.getElementById("toggleBtn").innerHTML = isLogin ? 
            "New recruit? <span>Join the Elite</span>" : 
            "Already Elite? <span>Login Here</span>";
        updateStatus("");
    }

    async function handleAuth() {
        const email = document.getElementById("email").value.trim();
        const pass = document.getElementById("pass").value.trim();
        const name = document.getElementById("name").value.trim();
        const btn = document.getElementById("actionBtn");

        if (!email || !pass || (!isLogin && !name)) {
            updateStatus("⚠️ Fill all intel fields!", "#ffa500");
            return;
        }

        btn.disabled = true;
        btn.innerText = "Synchronizing...";

        try {
            if (isLogin) {
                await auth.signInWithEmailAndPassword(email, pass);
                updateStatus("✅ Access Granted. Redirecting...", "#00ff88");
            } else {
                const cred = await auth.createUserWithEmailAndPassword(email, pass);
                
                // Save Gamer Profile
                await db.collection("users").doc(cred.user.uid).set({
                    username: name,
                    email: email,
                    coins: 100,
                    level: 1,
                    joinedAt: firebase.firestore.FieldValue.serverTimestamp()
                });

                updateStatus("✅ Registration Complete! Log in now.", "#00ff88");
                setTimeout(toggleMode, 1500);
            }
        } catch (err) {
            updateStatus("❌ " + err.message, "#ff4b2b");
        } finally {
            btn.disabled = false;
            btn.innerText = isLogin ? "Access System" : "Finalize Intel";
        }
    }

    function updateStatus(msg, color) {
        const el = document.getElementById("status");
        el.innerText = msg;
        el.style.color = color;
    }
</script>

</body>
</html>
