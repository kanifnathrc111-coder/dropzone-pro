<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DropZone | Player Profile</title>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root { --neon-blue: #00f2ff; --neon-red: #ff3c3c; --glass: rgba(255, 255, 255, 0.03); }
        body { margin: 0; font-family: 'Rajdhani', sans-serif; background: #020205; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }
        
        .profile-card { width: 350px; background: var(--glass); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 40px; padding: 40px 20px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        
        .avatar-circle { width: 100px; height: 100px; background: linear-gradient(45deg, var(--neon-blue), #7000ff); border-radius: 50%; margin: 0 auto 20px; display: flex; justify-content: center; align-items: center; font-size: 3rem; border: 4px solid #020205; box-shadow: 0 0 20px var(--neon-blue); }
        
        .user-name { font-family: 'Orbitron'; font-size: 1.5rem; color: white; margin-bottom: 5px; }
        .game-id { color: var(--neon-blue); font-weight: bold; letter-spacing: 2px; margin-bottom: 25px; display: block; }
        
        .info-box { background: rgba(0,0,0,0.3); padding: 15px; border-radius: 20px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.05); text-align: left; }
        .info-label { font-size: 0.7rem; color: #666; text-transform: uppercase; letter-spacing: 1px; }
        .info-value { font-size: 0.9rem; color: #ddd; display: flex; justify-content: space-between; align-items: center; margin-top: 5px; }
        
        .copy-btn { background: none; border: 1px solid var(--neon-blue); color: var(--neon-blue); padding: 4px 8px; border-radius: 5px; font-size: 0.6rem; cursor: pointer; transition: 0.3s; }
        .copy-btn:hover { background: var(--neon-blue); color: black; }

        .action-btns { margin-top: 30px; display: flex; flex-direction: column; gap: 10px; }
        .btn { padding: 15px; border: none; border-radius: 15px; font-family: 'Orbitron'; font-weight: bold; cursor: pointer; transition: 0.3s; display: flex; justify-content: center; align-items: center; gap: 10px; }
        
        .btn-wallet { background: var(--neon-blue); color: black; text-decoration: none; }
        .btn-logout { background: none; border: 1px solid var(--neon-red); color: var(--neon-red); }
        .btn-logout:hover { background: var(--neon-red); color: white; }

        .back-link { margin-top: 20px; display: block; color: #444; text-decoration: none; font-size: 0.8rem; }
    </style>
</head>
<body>

    <div class="profile-card">
        <div class="avatar-circle"><i class="fa-solid fa-user-ninja"></i></div>
        
        <div class="user-name" id="displayUsername">Loading...</div>
        <span class="game-id" id="displayGameId">FF-ID: -----</span>

        <div class="info-box">
            <div class="info-label">Your Unique ID (UID)</div>
            <div class="info-value">
                <span id="displayUid">Checking...</span>
                <button class="copy-btn" id="copyUidBtn">COPY</button>
            </div>
        </div>

        <div class="info-box">
            <div class="info-label">Email Address</div>
            <div class="info-value" id="displayEmail">----@gmail.com</div>
        </div>

        <div class="action-btns">
            <a href="wallet.html" class="btn btn-wallet"><i class="fa-solid fa-wallet"></i> MY WALLET</a>
            <button class="btn btn-logout" id="logoutBtn"><i class="fa-solid fa-right-from-bracket"></i> LOGOUT SYSTEM</button>
        </div>

        <a href="dashboard.html" class="back-link"><i class="fa-solid fa-chevron-left"></i> BACK TO DASHBOARD</a>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAtqdZUIdCnUKwVF0ojn_Mv-zARgv0m4H0",
        authDomain: "dropzoneff-b9667.firebaseapp.com",
        projectId: "dropzoneff-b9667",
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // --- 1. Load Profile Data ---
    onAuthStateChanged(auth, async (user) => {
        if (user) {
            document.getElementById('displayUid').innerText = user.uid;
            document.getElementById('displayEmail').innerText = user.email;

            // Firestore मधून बाकी डिटेल्स आणणे
            const userRef = doc(db, "users", user.uid);
            const snap = await getDoc(userRef);
            
            if (snap.exists()) {
                const data = snap.data();
                document.getElementById('displayUsername').innerText = data.username || "Gamer";
                document.getElementById('displayGameId').innerText = "FF-ID: " + (data.gameId || "Not Set");
            }
        } else {
            window.location.href = "login.html";
        }
    });

    // --- 2. Copy UID Function ---
    document.getElementById('copyUidBtn').onclick = () => {
        const uid = document.getElementById('displayUid').innerText;
        navigator.clipboard.writeText(uid);
        Swal.fire({
            title: 'UID Copied!',
            text: 'हा UID रिवॉर्ड घेण्यासाठी ॲडमिनला पाठवा.',
            icon: 'success',
            timer: 1500,
            showConfirmButton: false,
            background: '#05070a',
            color: '#fff'
        });
    };

    // --- 3. Logout Logic ---
    document.getElementById('logoutBtn').onclick = () => {
        Swal.fire({
            title: 'Logout?',
            text: "तुम्हाला खरंच सिस्टिममधून बाहेर पडायचे आहे का?",
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#ff3c3c',
            confirmButtonText: 'हो, Logout करा!',
            background: '#05070a',
            color: '#fff'
        }).then((result) => {
            if (result.isConfirmed) {
                signOut(auth).then(() => {
                    window.location.href = "login.html";
                });
            }
        });
    };
</script>
</body>
</html>
