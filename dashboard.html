<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DropZone Elite | Cyber Arena</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary: #ff1a1a;
            --secondary: #ffcc00;
            --neon-blue: #00f2ff;
            --cyber-green: #05ff8d;
            --bg: #020205;
            --card-bg: rgba(5, 7, 10, 0.7);
            --border: rgba(0, 242, 255, 0.2);
        }

        body {
            margin: 0; font-family: 'Rajdhani', sans-serif;
            background: var(--bg); color: white; padding-bottom: 120px; overflow-x: hidden;
            background-image: 
                linear-gradient(180deg, rgba(2,2,5,0.9) 0%, rgba(2,2,5,0.7) 100%),
                url('https://images.wallpapersden.com/wallpapers/3d/4k-free-fire-battlegrounds_71109.jpg'); /* 🔥 FF BG */
            background-size: cover; background-attachment: fixed; background-position: center;
        }

        /* 💥 Glitch Effect for Title */
        @keyframes glitch {
            0% { text-shadow: 2px 0 var(--primary), -2px 0 var(--neon-blue); }
            50% { text-shadow: -2px 0 var(--primary), 2px 0 var(--neon-blue); }
            100% { text-shadow: 2px 0 var(--primary), -2px 0 var(--neon-blue); }
        }

        header {
            padding: 15px 25px; display: flex; justify-content: space-between; align-items: center;
            background: rgba(2,2,5,0.9); backdrop-filter: blur(20px);
            border-bottom: 2px solid var(--border); position: sticky; top: 0; z-index: 999;
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.2);
        }

        /* 👤 Avatar with Dual Neon Glow */
        .avatar-wrapper { position: relative; cursor: pointer; }
        .avatar { 
            width: 52px; height: 52px; border: 2px solid var(--neon-blue); 
            border-radius: 8px; /* Sharp corners */
            box-shadow: 0 0 15px var(--neon-blue), inset 0 0 10px rgba(0, 242, 255, 0.3);
            transition: 0.3s;
        }
        .avatar:hover { border-color: var(--primary); box-shadow: 0 0 20px var(--primary); }
        
        .admin-badge {
            position: absolute; bottom: -6px; right: -6px;
            background: var(--primary); color: white; font-size: 8px;
            padding: 2px 6px; border-radius: 4px; font-family: 'Orbitron';
            text-transform: uppercase; font-weight: bold; display: none;
            box-shadow: 0 0 10px var(--primary);
        }

        /* 💎 Cyber Wallet Card */
        .wallet-stat {
            margin: 25px; background: var(--card-bg);
            padding: 25px; border-radius: 12px; border: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
            position: relative; overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }
        .wallet-stat::before { /* Corner accent */
            content: ''; position: absolute; top: -10px; left: -10px;
            width: 30px; height: 30px; background: var(--neon-blue);
            transform: rotate(45deg); opacity: 0.5;
        }
        
        .live-dot {
            width: 8px; height: 8px; background: var(--cyber-green); border-radius: 50%;
            display: inline-block; margin-right: 8px;
            box-shadow: 0 0 10px var(--cyber-green);
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }

        .add-btn {
            background: none; color: var(--neon-blue); border: 2px solid var(--neon-blue);
            padding: 12px 20px; border-radius: 8px; font-family: 'Orbitron';
            font-weight: 900; font-size: 11px; text-transform: uppercase;
            transition: 0.3s; cursor: pointer;
            box-shadow: 0 0 10px rgba(0, 242, 255, 0.2);
        }
        .add-btn:hover { background: var(--neon-blue); color: black; box-shadow: 0 0 25px var(--neon-blue); }

        /* 🃏 Match Card - Cyber Attack Design */
        .match-card {
            margin: 25px; background: var(--card-bg);
            border-radius: 12px; border: 1px solid var(--border);
            overflow: hidden; transition: 0.4s; position: relative;
            transform-style: preserve-3d; /* For 3D Hover */
        }
        .match-card:hover {
            border-color: var(--primary);
            box-shadow: 0 0 30px rgba(255, 26, 26, 0.2);
            transform: scale(1.02) rotateX(2deg);
        }

        .banner-container { position: relative; height: 180px; overflow: hidden; }
        .banner-img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }
        .match-card:hover .banner-img { transform: scale(1.1); }
        
        .match-label {
            position: absolute; top: 15px; right: 15px;
            background: var(--primary); color: white;
            padding: 5px 15px; border-radius: 4px;
            font-size: 10px; font-family: 'Orbitron'; font-weight: bold;
            text-transform: uppercase; box-shadow: 0 0 15px var(--primary);
            animation: glitch 1s infinite;
        }

        .match-info { padding: 22px; position: relative; }
        .match-title {
            font-family: 'Orbitron'; font-size: 20px; color: white;
            text-transform: uppercase; margin: 0; letter-spacing: 1px;
        }
        
        /* ⚡ Live Slot Bar */
        .slot-bar { width: 100%; height: 8px; background: rgba(0,0,0,0.6); border-radius: 4px; margin-top: 15px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); }
        .slot-fill { width: 75%; height: 100%; background: linear-gradient(90deg, var(--cyber-green), var(--neon-blue), var(--primary)); box-shadow: 0 0 10px var(--neon-blue); }

        .join-btn {
            width: 100%; background: linear-gradient(135deg, #444 0%, #000 100%);
            border: 2px solid var(--border); padding: 16px; border-radius: 8px;
            color: var(--neon-blue); font-family: 'Orbitron'; font-weight: 900;
            text-transform: uppercase; margin-top: 20px; cursor: pointer;
            transition: 0.3s; box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }
        .join-btn:hover {
            border-color: var(--primary); color: var(--primary);
            box-shadow: 0 0 20px rgba(255, 26, 26, 0.3);
            background: linear-gradient(135deg, #222 0%, #000 100%);
        }

        /* 📱 Mobile Bottom Nav - Cyber Style */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; width: 100%; height: 75px;
            background: rgba(2,2,5,0.95); backdrop-filter: blur(20px);
            border-top: 2px solid var(--border);
            display: flex; justify-content: space-around; align-items: center; z-index: 2000;
        }
        .nav-btn { color: #555; font-size: 1.5rem; cursor: pointer; transition: 0.3s; padding: 10px; }
        .nav-btn:hover { color: white; }
        .nav-btn.active { color: var(--primary); filter: drop-shadow(0 0 10px var(--primary)); }
    </style>
</head>
<body>

<header>
    <div style="display:flex; align-items:center; gap:15px;">
        <div class="avatar-wrapper" id="profile-trigger">
            <img src="https://api.dicebear.com/7.x/bottts-neutral/svg?seed=Elite" class="avatar" id="u-avatar">
            <span id="admin-tag" class="admin-badge">ADMIN</span>
        </div>
        <div>
            <p style="margin:0; font-size:10px; color:#666; letter-spacing:2px; font-weight:700; text-transform:uppercase;">Player Session</p>
            <h3 id="u-name" style="margin:0; font-family:'Orbitron'; font-size:16px; color:white; text-shadow: 0 0 10px rgba(255,255,255,0.5);">...</h3>
        </div>
    </div>
    <div style="display:flex; gap:20px; align-items:center;">
        <i class="fa-solid fa-satellite-dish" style="color:var(--cyber-green); font-size: 1.2rem; animation: pulse 1s infinite;"></i>
        <i class="fa-solid fa-power-off" id="logout-btn" style="color:var(--primary); font-size: 1.2rem; cursor:pointer; filter: drop-shadow(0 0 5px var(--primary));"></i>
    </div>
</header>

<div class="wallet-stat">
    <div>
        <p style="margin:0; font-size:11px; color:#888; text-transform:uppercase; letter-spacing:1px;"><span class="live-dot"></span>Core Credits</p>
        <h2 id="u-coins" style="margin:5px 0 0 0; font-family:'Orbitron'; color:var(--secondary); font-size:28px;">💎 0</h2>
    </div>
    <button class="add-btn" onclick="window.location.href='wallet.html'">ADD CREDITS</button>
</div>

<div id="matches-section">
    </div>

<nav class="bottom-nav">
    <div class="nav-btn active"><i class="fa-solid fa-gamepad"></i></div>
    <div class="nav-btn" onclick="window.location.href='wallet.html'"><i class="fa-solid fa-wallet"></i></div>
    <div class="nav-btn" onclick="alert('Leaderboard Locked. Wait for Season End!')"><i class="fa-solid fa-trophy"></i></div>
</nav>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, onSnapshot, collection, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAtqdZUIdCnUKwVF0ojn_Mv-zARgv0m4H0",
        authDomain: "dropzoneff-b9667.firebaseapp.com",
        projectId: "dropzoneff-b9667",
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    onAuthStateChanged(auth, (user) => {
        if (user) {
            syncUser(user.uid);
            loadLiveMatches();
            
            const trigger = document.getElementById('profile-trigger');
            const tag = document.getElementById('admin-tag');
            
            // 🛡️ Admin Check
            if(user.uid === "KMZcKu5FRtN2CxY2AQjxWWlLCAh1") {
                tag.style.display = "block";
                trigger.onclick = () => window.location.href = 'admin.html';
            } else {
                trigger.onclick = () => window.location.href = 'profile.html';
            }
        } else {
            window.location.href = "login.html";
        }
    });

    function syncUser(uid) {
        onSnapshot(doc(db, "users", uid), (snap) => {
            if(snap.exists()) {
                document.getElementById('u-name').innerText = snap.data().username.toUpperCase();
                document.getElementById('u-coins').innerText = "💎 " + (snap.data().coins || 0);
            }
        });
    }

    function loadLiveMatches() {
        const q = query(collection(db, "matches"), orderBy("createdAt", "desc"));
        onSnapshot(q, (snap) => {
            const list = document.getElementById('matches-section');
            list.innerHTML = "";
            snap.forEach(mDoc => {
                const m = mDoc.data();
                const fillPercent = Math.floor(Math.random() * 30 + 65); // Realistic 65-95% Full
                list.innerHTML += `
                    <div class="match-card">
                        <div class="banner-container">
                            <img src="${m.image || 'https://images.wallpapersden.com/wallpapers/3d/4k-free-fire-battlegrounds_71109.jpg'}" class="banner-img">
                            <span class="match-label">ELITE TOURNAMENT</span>
                        </div>
                        <div class="match-info">
                            <h3 class="match-title">${m.title}</h3>
                            <div style="display:flex; justify-content:space-between; margin-top:18px; background:rgba(0,0,0,0.3); padding:10px; border-radius:8px;">
                                <div style="text-align:center">
                                    <span style="font-size:10px; color:#666; font-family:'Orbitron'">PRIZE POOL</span><br>
                                    <b style="color:var(--secondary); font-size:16px;">₹${m.prize}</b>
                                </div>
                                <div style="text-align:center">
                                    <span style="font-size:10px; color:#666; font-family:'Orbitron'">ENTRY FEE</span><br>
                                    <b style="color:var(--neon-blue); font-size:16px;">💎${m.fee}</b>
                                </div>
                                <div style="text-align:center">
                                    <span style="font-size:10px; color:#666; font-family:'Orbitron'">MAP / MODE</span><br>
                                    <b style="color:white; font-size:14px;">${m.map || 'Bermuda'} / SOLO</b>
                                </div>
                            </div>
                            <div class="slot-bar"><div class="slot-fill" style="width: ${fillPercent}%"></div></div>
                            <p style="font-size:10px; color:var(--cyber-green); margin-top:8px; font-family:'Orbitron'; text-transform:uppercase;">Filling Fast: ${fillPercent}% Slots Locked</p>
                            <button class="join-btn" onclick="window.location.href='join.html?id=${mDoc.id}'">ENTER ARENA</button>
                        </div>
                    </div>
                `;
            });
        });
    }

    document.getElementById('logout-btn').onclick = () => {
        if(confirm("Exit Arena? Connection will be lost.")) signOut(auth).then(() => window.location.href="login.html");
    };
</script>
</body>
</html>
