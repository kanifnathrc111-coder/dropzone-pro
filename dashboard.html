<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DropZone Pro | Elite Arena</title>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #ff4b2b;
            --neon: #00ff88;
            --bg: #020617;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: var(--bg);
            color: white;
            background-image: radial-gradient(circle at top right, #1e293b, #020617);
            min-height: 100vh;
            padding-bottom: 90px;
            overflow-x: hidden;
        }

        /* Smooth Loader Fade */
        #loader {
            position: fixed;
            inset: 0;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: 0.5s ease-out;
        }

        .scanner-line {
            width: 200px;
            height: 2px;
            background: var(--neon);
            box-shadow: 0 0 15px var(--neon);
            animation: scan 1.5s ease-in-out infinite;
        }

        @keyframes scan {
            0%, 100% { transform: translateY(-20px); opacity: 0; }
            50% { transform: translateY(20px); opacity: 1; }
        }

        /* Header UI */
        .header {
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(20px);
            background: rgba(2, 6, 23, 0.7);
            border-bottom: 1px solid var(--glass);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .avatar-ring {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            padding: 2px;
            background: linear-gradient(45deg, var(--primary), var(--neon));
            cursor: pointer;
        }

        .avatar {
            width: 100%;
            height: 100%;
            background: #000;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-family: 'Orbitron';
        }

        .balance-pill {
            background: rgba(0, 255, 136, 0.1);
            border: 1px solid rgba(0, 255, 136, 0.3);
            padding: 8px 16px;
            border-radius: 50px;
            color: var(--neon);
            font-weight: 700;
            font-family: 'Orbitron';
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.1);
        }

        /* Hero Section */
        .hero {
            margin: 20px;
            padding: 30px;
            border-radius: 30px;
            background: linear-gradient(135deg, #6366f1, #a855f7);
            position: relative;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .hero::before {
            content: '';
            position: absolute;
            top: 0; right: 0; bottom: 0; left: 0;
            background: url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
            opacity: 0.1;
        }

        /* Dynamic Match Cards */
        .match-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            padding: 20px;
        }

        .match-card {
            background: var(--glass);
            border: 1px solid rgba(255,255,255,0.05);
            padding: 20px;
            border-radius: 25px;
            text-align: center;
            transition: 0.3s;
            position: relative;
        }

        .match-card:hover {
            transform: translateY(-5px);
            background: rgba(255,255,255,0.08);
            border-color: var(--neon);
        }

        .btn-join {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px;
            width: 100%;
            border-radius: 14px;
            font-weight: bold;
            font-family: 'Orbitron';
            font-size: 10px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 75, 43, 0.3);
        }

        /* Bottom Nav */
        .nav-bar {
            position: fixed;
            bottom: 15px;
            left: 15px;
            right: 15px;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(25px);
            display: flex;
            justify-content: space-around;
            padding: 15px;
            border-radius: 25px;
            border: 1px solid var(--glass);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .nav-link {
            text-decoration: none;
            color: #64748b;
            font-size: 10px;
            text-align: center;
            transition: 0.3s;
        }

        .nav-link.active { color: var(--neon); }
    </style>
</head>
<body>

    <div id="loader">
        <div class="scanner-line"></div>
        <p style="font-family:'Orbitron'; font-size: 10px; margin-top: 20px; letter-spacing: 5px;">AUTHORIZING...</p>
    </div>

    <div class="header">
        <div style="display:flex; gap:12px; align-items:center;">
            <div class="avatar-ring" onclick="logout()">
                <div class="avatar" id="avatar">?</div>
            </div>
            <div>
                <div id="username" style="font-weight:700; font-size: 0.9rem;">GAMER</div>
                <div style="font-size:0.6rem; color:var(--neon); letter-spacing: 1px;">● SERVER STABLE</div>
            </div>
        </div>
        <div class="balance-pill" id="coins">💎 --</div>
    </div>

    <div class="hero">
        <div style="position:relative; z-index: 1;">
            <small style="letter-spacing: 3px; font-weight: 700;">LIVE EVENT</small>
            <h1 style="margin: 10px 0; font-family: 'Orbitron'; font-size: 1.5rem;">ELITE SQUAD BATTLE</h1>
            <p style="font-size: 0.8rem; margin-bottom: 20px;">Join now to win from 💎500 pool!</p>
            <button class="btn-join" style="background:white; color:#6366f1;" onclick="joinMatch(50, 'Elite Squad')">ENTER BATTLE</button>
        </div>
    </div>

    <h3 style="padding: 0 20px; font-family:'Orbitron'; font-size: 0.9rem; letter-spacing: 2px;">DAILY SCRIMS</h3>
    <div class="match-grid" id="matchContainer"></div>

    <nav class="nav-bar">
        <a href="#" class="nav-link active">🎮<br>PLAY</a>
        <a href="wallet.html" class="nav-link">💰<br>WALLET</a>
        <a href="leaderboard.html" class="nav-link">🏆<br>RANKS</a>
        <a href="profile.html" class="nav-link">👤<br>ME</a>
    </nav>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAtqdZUIdCnUKwVF0ojn_Mv-zARgv0m4H0",
            authDomain: "dropzoneff-b9667.firebaseapp.com",
            projectId: "dropzoneff-b9667"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // ⚡ INSTANT CACHE LOAD
        if(localStorage.getItem('cachedName')) {
            document.getElementById("username").innerText = localStorage.getItem('cachedName').toUpperCase();
            document.getElementById("avatar").innerText = localStorage.getItem('cachedName')[0].toUpperCase();
        }

        auth.onAuthStateChanged(user => {
            if (user) {
                syncUserData(user.uid);
            } else {
                window.location = "login.html";
            }
        });

        function syncUserData(uid) {
            db.collection("users").doc(uid).onSnapshot(doc => {
                if (doc.exists) {
                    const data = doc.data();
                    document.getElementById("username").innerText = (data.name || "GAMER").toUpperCase();
                    document.getElementById("coins").innerText = "💎 " + (data.coins || 0);
                    document.getElementById("avatar").innerText = (data.name ? data.name[0] : "G").toUpperCase();
                    localStorage.setItem('cachedName', data.name);
                    
                    // Hide loader with style
                    document.getElementById("loader").style.opacity = "0";
                    setTimeout(() => document.getElementById("loader").style.display = "none", 500);
                }
            });
        }

        // Render Matches
        const matches = [
            { type: 'SOLO', fee: 10, prize: 100 },
            { type: 'DUO', fee: 20, prize: 200 },
            { type: 'SQUAD', fee: 40, prize: 400 },
            { type: 'CUSTOM', fee: 5, prize: 50 }
        ];

        const matchContainer = document.getElementById("matchContainer");
        matches.forEach(m => {
            matchContainer.innerHTML += `
                <div class="match-card">
                    <div style="font-family:'Orbitron'; font-size: 12px; color:#94a3b8; margin-bottom:10px;">${m.type}</div>
                    <div style="font-size: 1.2rem; font-weight: 700; margin-bottom: 15px;">💎${m.prize}</div>
                    <button class="btn-join" onclick="joinMatch(${m.fee}, '${m.type}')">JOIN 💎${m.fee}</button>
                </div>
            `;
        });

        async function joinMatch(fee, type) {
            const user = auth.currentUser;
            if(!confirm(`Join ${type} for 💎${fee}?`)) return;

            try {
                const userRef = db.collection("users").doc(user.uid);
                await db.runTransaction(async t => {
                    const doc = await t.get(userRef);
                    const coins = doc.data().coins || 0;
                    if(coins < fee) throw "NOT ENOUGH DIAMONDS!";
                    t.update(userRef, { coins: coins - fee });
                    t.set(db.collection("registrations").doc(), {
                        uid: user.uid, match: type, fee: fee, time: firebase.firestore.FieldValue.serverTimestamp()
                    });
                });
                alert("🔥 REGISTERED SUCCESSFULLY!");
            } catch (e) { alert(e); }
        }

        function logout() { if(confirm("LOGOUT?")) auth.signOut(); }
    </script>
</body>
</html>
