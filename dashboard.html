<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DropZone Elite | Official Dashboard</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <style>
        :root {
            --neon-red: #ff3c3c;
            --neon-gold: #ffcc00;
            --bg-black: #05070a;
            --card-glass: rgba(255, 255, 255, 0.03);
            --border-glass: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0; font-family: 'Rajdhani', sans-serif;
            background: var(--bg-black); color: white;
            padding-bottom: 100px; overflow-x: hidden;
        }

        .glow-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 15% 15%, rgba(255, 60, 60, 0.05) 0%, transparent 40%);
            z-index: -1;
        }

        header {
            padding: 20px; display: flex; justify-content: space-between; align-items: center;
            background: rgba(0,0,0,0.6); backdrop-filter: blur(15px); border-bottom: 1px solid var(--border-glass);
            position: sticky; top: 0; z-index: 1000;
        }

        .avatar-box { display: flex; align-items: center; gap: 12px; }
        /* Admin Gate: Cursor pointer kela aahe jyamule tula samjel ki ithe click karayche aahe */
        .avatar-img { 
            width: 42px; height: 42px; border: 2px solid var(--neon-red); 
            border-radius: 10px; transform: rotate(-5deg); cursor: pointer;
            transition: 0.3s;
        }
        .avatar-img:active { transform: scale(0.9); }

        .top-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 20px; }
        .stat-card {
            background: var(--card-glass); border: 1px solid var(--border-glass);
            padding: 15px; border-radius: 20px; text-align: center;
        }
        .wallet-wide { grid-column: span 2; display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.05); }

        .rules-box {
            margin: 20px; padding: 20px; border-radius: 20px;
            background: rgba(255, 204, 0, 0.03); border: 1px dashed var(--neon-gold);
        }
        .rules-content { font-size: 0.8rem; color: #ccc; line-height: 1.5; white-space: pre-wrap; }

        .section-title { padding: 0 20px; font-family: 'Orbitron'; font-size: 14px; color: var(--neon-red); display: flex; align-items: center; gap: 10px; }
        .live-pulse { width: 8px; height: 8px; background: #00ff00; border-radius: 50%; animation: pulse 1s infinite; }

        .match-card {
            margin: 20px; background: var(--card-glass); border-radius: 25px;
            border: 1px solid var(--border-glass); overflow: hidden; transition: 0.3s;
        }
        .match-card:hover { border-color: var(--neon-red); transform: translateY(-3px); }
        .card-img { width: 100%; height: 140px; object-fit: cover; opacity: 0.8; }
        .card-body { padding: 15px; }
        .match-name { font-family: 'Orbitron'; color: var(--neon-gold); margin: 0; font-size: 1.1rem; }
        .match-info { display: flex; gap: 15px; margin: 10px 0; font-size: 0.75rem; color: #aaa; }
        
        .room-box { display: none; background: #111; padding: 12px; border-radius: 12px; margin-top: 10px; border: 1px solid var(--neon-red); }

        .btn-group { display: grid; grid-template-columns: 1fr 55px; gap: 10px; margin-top: 15px; }
        .btn-main { background: white; color: black; border: none; padding: 12px; border-radius: 12px; font-weight: 900; font-family: 'Orbitron'; cursor: pointer; font-size: 0.75rem; }
        .btn-side { background: #111; color: var(--neon-gold); border: 1px solid #333; border-radius: 12px; cursor: pointer; }

        .upload-section { margin: 20px; background: rgba(0,255,136,0.05); border: 1px solid rgba(0,255,136,0.2); padding: 20px; border-radius: 25px; }

        .navbar { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 85%; background: rgba(15,23,42,0.9); backdrop-filter: blur(20px); border-radius: 25px; display: flex; justify-content: space-around; padding: 12px; border: 1px solid var(--border-glass); }
        .nav-item { color: #555; font-size: 1.4rem; transition: 0.3s; cursor: pointer; }
        .nav-item.active { color: var(--neon-red); }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<div class="glow-bg"></div>

<header>
    <div class="avatar-box">
        <img src="https://api.dicebear.com/7.x/pixel-art/svg?seed=Warrior" class="avatar-img" onclick="goToAdmin()">
        <div>
            <p style="margin:0; font-size: 0.65rem; color: #555; letter-spacing: 2px;">GAMER PROFILE</p>
            <h3 id="u-name" style="margin:0; font-family: 'Orbitron'; font-size: 0.85rem;">LOADING...</h3>
        </div>
    </div>
    <i class="fa-solid fa-power-off" onclick="logout()" style="color: var(--neon-red); cursor: pointer;"></i>
</header>

<div class="top-stats">
    <div class="stat-card wallet-wide">
        <div style="text-align: left;">
            <p style="margin:0; font-size: 0.65rem; color: #888;">CURRENT CREDITS</p>
            <h2 id="u-coins" style="margin:0; font-family: 'Orbitron'; color: var(--neon-gold);">💎 0</h2>
        </div>
        <button onclick="window.location.href='wallet.html'" style="background: white; border:none; padding: 8px 15px; border-radius: 10px; font-weight: 800; font-size: 0.7rem;">TOP-UP</button>
    </div>
</div>

<div class="rules-box">
    <h3 style="margin:0 0 10px; font-family: 'Orbitron'; font-size: 0.8rem; color: var(--neon-gold);"><i class="fa-solid fa-book-open"></i> TOURNAMENT RULES</h3>
    <div id="rules-content" class="rules-content">Fetching latest rules...</div>
</div>

<div class="section-title"><div class="live-pulse"></div> ACTIVE TOURNAMENTS</div>

<div id="matches-list"></div>

<div class="upload-section">
    <h3 style="margin:0 0 10px; font-family: 'Orbitron'; font-size: 0.8rem; color: #00ff88;"><i class="fa-solid fa-medal"></i> CLAIM YOUR PRIZE</h3>
    <input type="text" id="m-id-input" placeholder="Enter Match ID" style="width:100%; background:#000; border:1px solid #333; padding:10px; border-radius:10px; color:white; margin-bottom:10px; font-family: 'Rajdhani';">
    <input type="file" id="proof-file" style="font-size: 0.7rem; color: #888; margin-bottom: 10px;">
    <button onclick="submitProof()" style="width:100%; background:#00ff88; color:black; border:none; padding:12px; border-radius:12px; font-family: 'Orbitron'; font-weight: bold; cursor:pointer;">UPLOAD BOOYAH PROOF</button>
</div>

<nav class="navbar">
    <div class="nav-item active"><i class="fa-solid fa-gamepad"></i></div>
    <div class="nav-item" onclick="window.location.href='wallet.html'"><i class="fa-solid fa-wallet"></i></div>
    <div class="nav-item" onclick="alert('Ranks coming soon!')"><i class="fa-solid fa-ranking-star"></i></div>
</nav>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAtqdZUIdCnUKwVF0ojn_Mv-zARgv0m4H0",
        authDomain: "dropzoneff-b9667.firebaseapp.com",
        projectId: "dropzoneff-b9667",
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    // 👤 AUTH & DATA SYNC
    auth.onAuthStateChanged(user => {
        if (user) {
            db.collection("users").doc(user.uid).onSnapshot(doc => {
                if(doc.exists) {
                    document.getElementById('u-name').innerText = doc.data().name.toUpperCase();
                    document.getElementById('u-coins').innerText = "💎 " + (doc.data().coins || 0);
                }
            });
            loadRules();
            loadTournaments();
        } else { window.location = "login.html"; }
    });

    // 🛡️ SECRET ADMIN GATE
    function goToAdmin() {
        const user = auth.currentUser;
        const ADMIN_UID = "KMZcKu5FRtN2CxY2AQjxWWlLCAh1"; // Tuza UID

        if (user && user.uid === ADMIN_UID) {
            window.location.href = 'admin.html';
        } else {
            // Normal players sathi kahihi honar nahi kiwa sadha alert disel
            console.log("Player profile accessed.");
        }
    }

    function loadRules() {
        db.collection("settings").doc("rules").onSnapshot(doc => {
            if(doc.exists) { document.getElementById('rules-content').innerText = doc.data().content; }
        });
    }

    function loadTournaments() {
        db.collection("matches").orderBy("createdAt", "desc").onSnapshot(snap => {
            const list = document.getElementById('matches-list');
            list.innerHTML = "";
            snap.forEach(doc => {
                const m = doc.data();
                list.innerHTML += `
                    <div class="match-card">
                        <img src="https://wallpapers.com/images/featured/free-fire-2plgcb4on8atv7vq.jpg" class="card-img">
                        <div class="card-body">
                            <h3 class="match-name">${m.title}</h3>
                            <div class="match-info">
                                <span><i class="fa-solid fa-clock"></i> ${m.time}</span>
                                <span><i class="fa-solid fa-map"></i> ${m.map}</span>
                                <span style="color:#00ff88;">Win: ₹${m.prize}</span>
                            </div>
                            <div id="room-box-${doc.id}" class="room-box">
                                <p style="margin:0; font-size:0.8rem;">ID: <b>${m.roomId || 'Wait 15m'}</b></p>
                                <p style="margin:0; font-size:0.8rem;">PASS: <b>${m.roomPass || 'Wait 15m'}</b></p>
                                <p style="margin:5px 0 0; font-size:0.6rem; color:var(--neon-red);">Match ID: ${doc.id}</p>
                            </div>
                            <div class="btn-group">
                                <button class="btn-main" onclick="joinMatch('${doc.id}', ${m.fee})">REGISTER FOR 💎${m.fee}</button>
                                <button class="btn-side" onclick="toggleRoom('${doc.id}')"><i class="fa-solid fa-key"></i></button>
                            </div>
                        </div>
                    </div>
                `;
            });
        });
    }

    async function joinMatch(id, fee) {
        if(!confirm("Spend 💎" + fee + " to join?")) return;
        const u = auth.currentUser;
        const uRef = db.collection("users").doc(u.uid);
        const rRef = db.collection("registrations").doc(id + "_" + u.uid);

        try {
            await db.runTransaction(async t => {
                const uDoc = await t.get(uRef);
                const rDoc = await t.get(rRef);
                if(rDoc.exists) throw "Already Registered!";
                const bal = uDoc.data().coins || 0;
                if(bal < fee) throw "Insufficient Balance!";
                t.update(uRef, { coins: bal - fee });
                t.set(rRef, { matchId: id, userId: u.uid, playerName: uDoc.data().name, status: "Joined" });
            });
            alert("🔥 Battle Locked! Good Luck.");
        } catch(e) { alert(e); }
    }

    async function submitProof() {
        const file = document.getElementById('proof-file').files[0];
        const mid = document.getElementById('m-id-input').value;
        if(!file || !mid) return alert("Fill all details!");

        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = async () => {
            await db.collection("winner_proofs").add({
                matchId: mid, userId: auth.currentUser.uid,
                image: reader.result, timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
            alert("🚀 Proof Uploaded! Admin will verify soon.");
        };
    }

    function toggleRoom(id) {
        const el = document.getElementById('room-box-' + id);
        el.style.display = el.style.display === 'none' ? 'block' : 'none';
    }

    function logout() { auth.signOut().then(() => window.location = "login.html"); }
</script>
</body>
</html>
